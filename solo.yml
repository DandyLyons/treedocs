name: treedocs
icon: null
processes:
  swift build:
    command: swift build
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  swift run:
    command: swift run
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  swift test:
    command: swift test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Preview DocC:
    command: swift package --disable-sandbox preview-documentation --target treedocs --port 8733
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Preview Site:
    command: python3 -m http.server 8734 --bind 127.0.0.1 --directory site
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
